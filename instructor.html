<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Regina Pilates — 강사</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F2; --white: #FFFFFF; --text: #1A1A1A; --muted: #888;
  --border: #E5E2DE; --accent: #1A1A1A; --success: #27AE60;
  --danger: #E74C3C; --warning: #E67E22; --surface: #F0EDE9;
  --radius: 14px; --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; overflow-x:hidden; }

/* ── 로그인 ── */
#login-screen { min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; background:var(--accent); }
.login-logo { font-family:'Outfit',sans-serif; font-weight:300; font-size:22px; letter-spacing:.15em; color:#fff; margin-bottom:6px; }
.login-sub { font-size:11px; color:rgba(255,255,255,.5); letter-spacing:.1em; margin-bottom:48px; }
.login-input { width:100%; padding:16px 20px; font-size:16px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1); color:#fff; border-radius:var(--radius); outline:none; margin-bottom:12px; font-family:inherit; }
.login-input::placeholder { color:rgba(255,255,255,.4); }
.login-btn { width:100%; padding:16px; background:#fff; color:var(--accent); border:none; border-radius:var(--radius); font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; }
.login-error { display:none; color:#FF6B6B; font-size:13px; text-align:center; margin-top:12px; }

/* ── 앱 ── */
#app { display:none; flex-direction:column; min-height:100dvh; }

/* ── 헤더 ── */
.app-header { background:var(--accent); color:#fff; padding:16px 20px; padding-top:calc(16px + var(--safe-top)); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-left .logo { font-family:'Outfit',sans-serif; font-weight:300; font-size:15px; letter-spacing:.1em; }
.header-left .instr { font-size:11px; color:rgba(255,255,255,.55); margin-top:2px; }
.header-right { display:flex; gap:8px; align-items:center; }
.hbtn { background:rgba(255,255,255,.15); border:none; color:#fff; padding:7px 13px; border-radius:20px; font-size:12px; cursor:pointer; font-family:inherit; white-space:nowrap; }

/* ── 날짜 네비 ── */
.date-nav { background:var(--white); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 6px; }
.date-arrow { background:none; border:none; padding:14px 10px; font-size:20px; color:var(--muted); cursor:pointer; flex-shrink:0; }
.date-tabs { display:flex; flex:1; gap:4px; padding:8px 2px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.date-tabs::-webkit-scrollbar { display:none; }
.date-tab { flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding:8px 13px; border-radius:10px; cursor:pointer; min-width:48px; }
.date-tab.active { background:var(--accent); color:#fff; }
.date-tab .dday { font-size:10px; opacity:.65; margin-bottom:2px; }
.date-tab .dnum { font-family:'Outfit',sans-serif; font-size:18px; font-weight:400; line-height:1; }
.date-tab.today:not(.active) .dnum { color:var(--danger); font-weight:700; }

/* ── 필터 바 ── */
.filter-bar { background:var(--white); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-chip { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--white); font-size:12px; font-family:inherit; color:var(--muted); cursor:pointer; white-space:nowrap; transition:all .15s; }
.filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── 스케줄 리스트 ── */
.schedule-list { flex:1; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.date-header { font-size:13px; color:var(--muted); padding:2px 2px 6px; font-weight:500; }

/* ── 카드 ── */
.schedule-card { background:var(--white); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.schedule-card.s-참석 { border-left:4px solid var(--success); background:#FAFFFE; }
.schedule-card.s-노쇼 { border-left:4px solid var(--danger); background:#FFFAFA; }
.schedule-card.s-취소 { border-left:4px solid var(--border); opacity:.45; }
.schedule-card.s-확정 { border-left:4px solid var(--accent); }
.card-done-banner { display:flex; align-items:center; gap:6px; padding:7px 16px; font-size:13px; font-weight:600; }
.card-done-banner.done-참석 { background:#EAFAF1; color:var(--success); }
.card-done-banner.done-노쇼 { background:#FDEDEC; color:var(--danger); }
.card-main { padding:15px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none; }
.card-main:active { background:var(--surface); }
.card-time { font-family:'Outfit',sans-serif; font-size:24px; font-weight:300; min-width:60px; }
.card-info { flex:1; min-width:0; }
.card-member { font-size:18px; font-weight:700; margin-bottom:3px; }
.card-sub { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-instr { font-size:13px; color:var(--muted); margin-top:2px; }
.card-phone { font-size:13px; color:var(--accent); margin-top:4px; font-weight:500; }
.card-badge { flex-shrink:0; font-size:13px; font-weight:600; padding:6px 12px; border-radius:20px; }
.cb-확정 { background:#F0EDE9; color:var(--muted); }
.cb-참석 { background:#EAFAF1; color:var(--success); }
.cb-노쇼 { background:#FDEDEC; color:var(--danger); }
.cb-취소 { background:#F5F5F5; color:#bbb; }

/* ── 카드 패널 (펼쳐지는 영역) ── */
.card-panel { display:none; border-top:1px solid var(--border); }
.card-panel.open { display:block; }

/* 탭 */
.panel-tabs { display:flex; border-bottom:1px solid var(--border); }
.panel-tab { flex:1; padding:11px 0; text-align:center; font-size:13px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
.panel-tab.active { color:var(--text); font-weight:600; border-bottom-color:var(--accent); }

.panel-content { padding:16px; }

/* 출석체크 탭 */
.attend-row { display:flex; gap:8px; margin-bottom:10px; }
.attend-btn { flex:1; padding:16px 8px; border:none; border-radius:10px; font-size:17px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.attend-btn:active { opacity:.8; transform:scale(.97); }
.btn-att { background:var(--success); color:#fff; }
.btn-nos { background:var(--danger); color:#fff; }
.btn-can { background:var(--surface); color:var(--muted); font-size:13px; font-weight:500; }
.btn-rev { background:var(--surface); color:var(--muted); font-size:13px; }

/* 컨디션 */
.cond-label { font-size:12px; color:var(--muted); margin-bottom:6px; }
.cond-row { display:flex; gap:5px; margin-bottom:10px; }
.cond-btn { flex:1; padding:10px 2px; border:1px solid var(--border); background:var(--white); border-radius:8px; font-size:13px; font-family:inherit; cursor:pointer; text-align:center; }
.cond-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.memo-ta { width:100%; padding:11px 13px; border:1px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; resize:none; min-height:64px; outline:none; margin-bottom:10px; }
.memo-ta:focus { border-color:var(--accent); }
.confirm-btn { width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:17px; font-weight:700; font-family:inherit; cursor:pointer; letter-spacing:.02em; }
.confirm-btn:active { opacity:.85; }
.confirm-btn.success { background:var(--success); }
.confirm-btn.danger { background:var(--danger); }

/* 히스토리 탭 */
.history-item { padding:10px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start; }
.history-item:last-child { border-bottom:none; }
.history-date { font-size:13px; color:var(--muted); min-width:76px; flex-shrink:0; }
.history-body { flex:1; }
.history-status { font-size:15px; font-weight:700; margin-bottom:4px; }
.hs-참석 { color:var(--success); } .hs-노쇼 { color:var(--danger); }
.history-cond { display:inline-block; font-size:14px; background:var(--surface); padding:4px 10px; border-radius:10px; margin-bottom:5px; font-weight:500; }
.history-memo { font-size:15px; color:var(--text); line-height:1.6; }
.history-empty { font-size:15px; color:var(--muted); padding:20px 0; text-align:center; }

/* ── 신규예약 모달 ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:flex-end; }
.modal-overlay.open { display:flex; }
.modal-sheet { background:var(--white); border-radius:20px 20px 0 0; width:100%; max-height:90dvh; overflow-y:auto; padding-bottom:calc(24px + var(--safe-bottom)); }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto; }
.modal-title { font-size:16px; font-weight:700; padding:0 20px 16px; border-bottom:1px solid var(--border); }
.modal-body { padding:20px; display:flex; flex-direction:column; gap:14px; }
.field-label { font-size:12px; color:var(--muted); margin-bottom:5px; }
.field-select { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; background:var(--white); outline:none; }
.field-input { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; outline:none; }
.field-select:focus, .field-input:focus { border-color:var(--accent); }
.time-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.time-chip { padding:9px 4px; border:1px solid var(--border); border-radius:8px; text-align:center; font-size:13px; font-family:inherit; background:var(--white); cursor:pointer; }
.time-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.recurring-row { display:flex; align-items:center; gap:10px; }
.toggle-label { font-size:14px; flex:1; }
.toggle { position:relative; width:44px; height:24px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:12px; cursor:pointer; transition:.2s; }
.toggle-slider:before { content:''; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--accent); }
.toggle input:checked + .toggle-slider:before { transform:translateX(20px); }
.modal-footer { padding:0 20px; display:flex; gap:8px; }
.modal-btn { flex:1; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; }
.modal-btn.primary { background:var(--accent); color:#fff; }
.modal-btn.secondary { background:var(--surface); color:var(--muted); }

/* ── 로딩/빈 상태 ── */
.loading-wrap { display:flex; align-items:center; justify-content:center; padding:60px 0; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--muted); gap:10px; }
.empty-icon { font-size:36px; }

/* ── 토스트 ── */
.toast { position:fixed; bottom:calc(20px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(16px); background:var(--accent); color:#fff; padding:11px 22px; border-radius:22px; font-size:13px; font-weight:500; opacity:0; transition:all .22s; z-index:9999; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.success { background:var(--success); }
.toast.error { background:var(--danger); }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-logo">REGINA PILATES</div>
  <div class="login-sub">레지나 필라테스 청담</div>
  <div style="width:100%;max-width:320px;">
    <input class="login-input" type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다</div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <div class="logo">REGINA PILATES</div>
      <div class="instr" id="header-instr"></div>
    </div>
    <div class="header-right">
      <button class="hbtn" onclick="openNewScheduleModal()">+ 예약</button>
      <button class="hbtn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 날짜 탭 -->
  <div class="date-nav">
    <button class="date-arrow" onclick="shiftWeek(-1)">‹</button>
    <div class="date-tabs" id="date-tabs"></div>
    <button class="date-arrow" onclick="shiftWeek(1)">›</button>
  </div>

  <!-- 강사 필터 -->
  <div class="filter-bar" id="filter-bar" style="display:none;">
    <button class="filter-chip active" data-id="" onclick="setInstrFilter('',this)">전체</button>
  </div>

  <!-- 스케줄 목록 -->
  <div class="schedule-list" id="schedule-list">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- 신규 예약 모달 -->
<div class="modal-overlay" id="modal-new-schedule" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">새 예약 등록</div>
    <div class="modal-body">
      <div>
        <div class="field-label">회원</div>
        <select class="field-select" id="ns-member" onchange="onNsMemberChange()">
          <option value="">회원 선택</option>
        </select>
      </div>
      <div>
        <div class="field-label">계약 (프로그램)</div>
        <select class="field-select" id="ns-contract"><option value="">회원을 먼저 선택하세요</option></select>
      </div>
      <div>
        <div class="field-label">날짜</div>
        <input class="field-input" type="date" id="ns-date">
      </div>
      <div>
        <div class="field-label">시간</div>
        <div class="time-grid" id="ns-time-grid"></div>
      </div>
      <div id="ns-recurring-section">
        <div class="recurring-row">
          <span class="toggle-label">정기 예약</span>
          <label class="toggle"><input type="checkbox" id="ns-recurring" onchange="onRecurringChange()"><span class="toggle-slider"></span></label>
        </div>
        <div id="ns-recurring-day-row" style="display:none;margin-top:10px;">
          <div class="field-label">반복 요일</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${['월','화','수','목','금'].map(d=>`<button class="time-chip" onclick="selectDay('${d}',this)">${d}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeModal()">취소</button>
      <button class="modal-btn primary" onclick="saveNewSchedule()">예약 등록</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
const TIMES = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];

let myLevel = 0;
let myInstr = null;          // 로그인한 강사 객체
let allInstrs = [];          // 전체 강사 목록
let allMembers = [];
let allContracts = [];
let allSchedules = [];
let selectedDate = '';
let weekOffset = 0;
let instrFilter = '';        // 강사 필터 ID

// ── 유틸 ──
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getTodayStr() { return toDateStr(new Date()); }
function getWeekDates(offset=0) {
  const base = new Date();
  base.setDate(base.getDate() + offset*7);
  const day = base.getDay()===0?6:base.getDay()-1;
  const mon = new Date(base); mon.setDate(base.getDate()-day);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

// ── 로그인/로그아웃 ──
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  try {
    const res = await fetch(`${API}/api/auth`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const data = await res.json();
    if (res.ok && data.success) {
      sessionStorage.setItem('instrPw', pw);
      sessionStorage.setItem('instrLevel', data.level);
      await initApp(data.level);
    } else { document.getElementById('login-error').style.display='block'; }
  } catch(e) { document.getElementById('login-error').style.display='block'; }
}
function doLogout() {
  sessionStorage.clear();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ── 초기화 ──
async function initApp(level) {
  myLevel = level;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';

  // 공통 데이터 로드
  const [instrRes, mRes, cRes] = await Promise.all([
    fetch(`${API}/api/instructors`),
    fetch(`${API}/api/members`),
    fetch(`${API}/api/contracts`),
  ]);
  const instrData = await instrRes.json();
  const mData = await mRes.json();
  const cData = await cRes.json();

  allInstrs = instrData.instructors || [];
  allMembers = mData.members || [];
  allContracts = cData.contracts || [];

  // 로그인한 강사 식별 (L2는 첫 번째 매칭 강사, L1은 원장)
  if (level === 1) {
    myInstr = { id: '__director__', name: 'Regina 원장', isDirector: true };
  } else {
    // L2 강사: 강사 목록 중 Regina(L1) 제외한 첫 번째 (실제로는 비밀번호 매핑이 없으므로 첫 번째 비Regina 강사)
    myInstr = allInstrs.find(i => !i.isDirector && i.level !== 1) || allInstrs[0] || { id: '', name: '강사' };
  }

  document.getElementById('header-instr').textContent = myInstr.name;

  // 강사 필터 초기화
  buildInstrFilter();

  selectedDate = getTodayStr();
  weekOffset = 0;
  renderDateTabs();
  await loadSchedules();
  initTimeGrid();
  initMemberSelect();
}

// ── 강사 필터 ──
function buildInstrFilter() {
  const bar = document.getElementById('filter-bar');

  // 보여줄 강사 목록 결정
  let visibleInstrs = [];
  if (myLevel === 1) {
    // L1: 모든 강사
    visibleInstrs = allInstrs;
  } else {
    // L2: Regina(원장) 제외
    visibleInstrs = allInstrs.filter(i => !i.isDirector && i.name !== 'Regina' && i.name !== 'Regina 원장');
  }

  if (visibleInstrs.length <= 1) { bar.style.display='none'; return; }
  bar.style.display='flex';

  bar.innerHTML = `<button class="filter-chip active" data-id="" onclick="setInstrFilter('',this)">전체</button>` +
    visibleInstrs.map(i =>
      `<button class="filter-chip" data-id="${i.id}" onclick="setInstrFilter('${i.id}',this)">${i.name}</button>`
    ).join('');
}

function setInstrFilter(id, el) {
  instrFilter = id;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderScheduleList();
}

// ── 날짜 탭 ──
function renderDateTabs() {
  const todayStr = getTodayStr();
  const days = ['일','월','화','수','목','금','토'];
  const dates = getWeekDates(weekOffset);
  const tabs = document.getElementById('date-tabs');
  tabs.innerHTML = dates.map(d => {
    const ds = toDateStr(d);
    const isT = ds===todayStr, isSel = ds===selectedDate;
    return `<div class="date-tab${isSel?' active':''}${isT?' today':''}" onclick="selectDate('${ds}')">
      <span class="dday">${days[d.getDay()]}</span>
      <span class="dnum">${d.getDate()}</span>
    </div>`;
  }).join('');
  setTimeout(()=>{ const a=tabs.querySelector('.active'); if(a) a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}); },50);
}
function selectDate(ds) { selectedDate=ds; renderDateTabs(); renderScheduleList(); }
function shiftWeek(dir) {
  weekOffset+=dir;
  const dates=getWeekDates(weekOffset);
  selectedDate=toDateStr(dates[0]);
  renderDateTabs();
  loadSchedules();
}

// ── 스케줄 로드 ──
async function loadSchedules() {
  document.getElementById('schedule-list').innerHTML='<div class="loading-wrap"><div class="spinner"></div></div>';
  const dates=getWeekDates(weekOffset);
  const s=toDateStr(dates[0]), e=toDateStr(dates[dates.length-1]);
  try {
    const res = await fetch(`${API}/api/schedules?startDate=${s}&endDate=${e}`);
    const data = await res.json();
    allSchedules = data.schedules || [];
    renderScheduleList();
  } catch(err) {
    document.getElementById('schedule-list').innerHTML='<div class="empty-wrap"><div class="empty-icon">⚠️</div><div>불러오기 실패</div></div>';
  }
}

// ── 스케줄 렌더 ──
function renderScheduleList() {
  const list = document.getElementById('schedule-list');
  const memberMap={}, contractMap={}, instrMap={};
  allMembers.forEach(m=>memberMap[m.id]=m);
  allContracts.forEach(c=>contractMap[c.id]=c);
  allInstrs.forEach(i=>instrMap[i.id]=i);

  let items = allSchedules
    .filter(s=>s.date===selectedDate && s.status!=='취소')
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  // 권한 필터
  if (myLevel !== 1) {
    // L2: 레지나 제외 (강사 이름이 Regina인 경우)
    const reginaIds = allInstrs.filter(i=>i.name==='Regina'||i.name==='Regina 원장').map(i=>i.id);
    items = items.filter(s=>!reginaIds.includes(s.instructorId));
  }

  // 강사 필터
  if (instrFilter) items = items.filter(s=>s.instructorId===instrFilter);

  if (items.length===0) {
    list.innerHTML=`<div class="empty-wrap"><div class="empty-icon">📅</div><div>${selectedDate===getTodayStr()?'오늘은 예약이 없어요':'예약이 없습니다'}</div></div>`;
    return;
  }

  const d=new Date(selectedDate+'T00:00:00');
  const dayNames=['일','월','화','수','목','금','토'];
  const todayTag=selectedDate===getTodayStr()?` · 오늘`:'';
  list.innerHTML=`<div class="date-header">${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})${todayTag}</div>`+
    items.map(s=>buildCard(s,memberMap,contractMap,instrMap)).join('');
}

function buildCard(s, memberMap, contractMap, instrMap) {
  const m=memberMap[s.memberId]||{};
  const c=contractMap[s.contractId]||{};
  const instr=instrMap[s.instructorId]||{};
  const status=s.status||'확정';
  const label={확정:'예약',참석:'완료',노쇼:'노쇼',취소:'취소'}[status]||status;
  const rem=c.remainingSessions!=null?`잔여 ${c.remainingSessions}회 · `:'';
  const isDone=status==='참석'||status==='노쇼';
  const phone=m.phone||'';

  // 완료 배너 (참석/노쇼)
  const doneBanner = isDone ? `
    <div class="card-done-banner done-${status}">
      ${status==='참석'?'✓ 출석 완료':'✕ 노쇼'}
    </div>` : '';

  return `<div class="schedule-card s-${status}" id="card-${s.id}">
    ${doneBanner}
    <div class="card-main" onclick="toggleCard('${s.id}')">
      <div class="card-time">${s.time||'—'}</div>
      <div class="card-info">
        <div class="card-member">${m.name||'—'}</div>
        <div class="card-sub">${rem}${c.title||'—'}</div>
        <div class="card-instr">${instr.name||'—'}</div>
        ${phone?`<a class="card-phone" href="tel:${phone}" onclick="event.stopPropagation()">📞 ${phone}</a>`:''}
      </div>
      <div class="card-badge cb-${status}">${label}</div>
    </div>
    <div class="card-panel" id="panel-${s.id}">
      <!-- 패널 탭 -->
      <div class="panel-tabs">
        <div class="panel-tab active" id="ptab-attend-${s.id}" onclick="switchPanelTab('${s.id}','attend')">${isDone?'수정':'출석체크'}</div>
        <div class="panel-tab" id="ptab-history-${s.id}" onclick="switchPanelTab('${s.id}','history')">히스토리</div>
      </div>
      <!-- 출석체크/수정 탭 내용 -->
      <div class="panel-content" id="pcon-attend-${s.id}">
        ${buildAttendContent(s, isDone, status)}
      </div>
      <!-- 히스토리 탭 내용 -->
      <div class="panel-content" id="pcon-history-${s.id}" style="display:none;">
        <div class="loading-wrap" style="padding:20px 0;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>`;
}

function buildAttendContent(s, isDone, status) {
  if (!isDone) {
    return `
      <div class="attend-row">
        <button class="attend-btn btn-att" onclick="startAttend('${s.id}','참석','${s.memberId}','${s.contractId}','${s.instructorId||''}')">✓ 완료</button>
        <button class="attend-btn btn-nos" onclick="startAttend('${s.id}','노쇼','${s.memberId}','${s.contractId}','${s.instructorId||''}')">✕ 노쇼</button>
      </div>
      <button class="attend-btn btn-can" style="width:100%;margin-top:0;" onclick="cancelSchedule('${s.id}')">취소 처리</button>
      <div id="attend-form-${s.id}" style="display:none;margin-top:14px;">
        <div class="cond-label" id="cond-label-${s.id}">컨디션</div>
        <div class="cond-row" id="cond-row-${s.id}">
          ${['최상','좋음','보통','피로','통증'].map(c=>`<button class="cond-btn" id="cb-${s.id}-${c}" onclick="selectCond('${s.id}','${c}')">${c}</button>`).join('')}
        </div>
        <textarea class="memo-ta" id="memo-${s.id}" placeholder="메모 (선택사항)"></textarea>
        <button class="confirm-btn" id="cfbtn-${s.id}" onclick="">확인</button>
      </div>`;
  } else {
    // 완료/노쇼 수정 화면 - 기존 세션 데이터는 loadDoneSession()으로 비동기 로드
    return `
      <div style="margin-bottom:6px;">
        <div class="cond-label">컨디션</div>
        <div class="cond-row">
          ${['최상','좋음','보통','피로','통증'].map(c=>`<button class="cond-btn" id="ce-${s.id}-${c}" onclick="selectCondEdit('${s.id}','${c}')">${c}</button>`).join('')}
        </div>
      </div>
      <div class="cond-label">메모</div>
      <textarea class="memo-ta" id="memo-edit-${s.id}" placeholder="메모 입력"></textarea>
      <button class="confirm-btn" style="background:var(--success);margin-bottom:10px;" onclick="saveMemoEdit('${s.id}','${s.contractId}')">저장</button>
      <button class="attend-btn btn-rev" style="width:100%;" onclick="revertStatus('${s.id}','${status}','${s.memberId}','${s.contractId}')">
        ${status==='참석'?'완료 → 노쇼로 변경':'노쇼 → 완료로 변경'}
      </button>`;
  }
}

function selectCondEdit(id, cond) {
  document.querySelectorAll(`[id^="ce-${id}-"]`).forEach(b=>b.classList.remove('active'));
  document.getElementById(`ce-${id}-${cond}`)?.classList.add('active');
}

// 완료 패널 열릴 때 기존 세션 데이터 로드
async function loadDoneSession(scheduleId, contractId, date, time) {
  try {
    const r = await fetch(`${API}/api/sessions?contractId=${contractId}`);
    const d = await r.json();
    const sess = (d.sessions||[]).find(se=>se.date===date&&se.time===time);
    if (sess) {
      if (sess.condition) selectCondEdit(scheduleId, sess.condition);
      const mta = document.getElementById(`memo-edit-${scheduleId}`);
      if (mta && sess.memo && sess.memo!=='NO-SHOW') mta.value=sess.memo;
      // 패널 엘리먼트에 sessionId 저장
      const panel = document.getElementById(`panel-${scheduleId}`);
      if (panel) panel.dataset.sessionId = sess.id;
    }
  } catch(e) {}
}

// ── 카드 토글 ──
function toggleCard(id) {
  const panel = document.getElementById(`panel-${id}`);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.card-panel.open').forEach(p=>p.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    // 완료/노쇼 상태면 기존 세션 데이터 로드
    const card = document.getElementById(`card-${id}`);
    const isDone = card?.classList.contains('s-참석') || card?.classList.contains('s-노쇼');
    if (isDone && !panel.dataset.sessionId) {
      const s = allSchedules.find(sc=>sc.id===id);
      if (s?.contractId) loadDoneSession(id, s.contractId, s.date, s.time);
    }
  }
}

// ── 패널 탭 전환 ──
function switchPanelTab(id, tab) {
  ['attend','history'].forEach(t=>{
    document.getElementById(`ptab-${t}-${id}`)?.classList.toggle('active', t===tab);
    const con=document.getElementById(`pcon-${t}-${id}`);
    if (con) con.style.display = t===tab?'block':'none';
  });
  if (tab==='history') loadHistory(id);
}

// ── 히스토리 로드 ──
async function loadHistory(scheduleId) {
  const s = allSchedules.find(sc=>sc.id===scheduleId);
  if (!s?.contractId) {
    document.getElementById(`pcon-history-${scheduleId}`).innerHTML='<div class="history-empty">계약 정보 없음</div>';
    return;
  }
  try {
    const res = await fetch(`${API}/api/sessions?contractId=${s.contractId}`);
    const data = await res.json();
    const sessions = (data.sessions||[])
      .filter(se=>se.attendanceStatus==='참석'||se.attendanceStatus==='노쇼')
      .sort((a,b)=>b.date.localeCompare(a.date));

    if (sessions.length===0) {
      document.getElementById(`pcon-history-${scheduleId}`).innerHTML='<div class="history-empty">수업 기록 없음</div>';
      return;
    }
    document.getElementById(`pcon-history-${scheduleId}`).innerHTML = sessions.map(se=>`
      <div class="history-item">
        <div class="history-date">${se.date}<br><span style="font-size:11px;">${se.time||''}</span></div>
        <div class="history-body">
          <div class="history-status hs-${se.attendanceStatus}">${se.attendanceStatus==='참석'?'출석':'노쇼'}</div>
          ${se.condition?`<span class="history-cond">${se.condition}</span>`:''}
          ${se.memo&&se.memo!=='NO-SHOW'?`<div class="history-memo">${se.memo}</div>`:''}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById(`pcon-history-${scheduleId}`).innerHTML='<div class="history-empty">불러오기 실패</div>';
  }
}

// ── 컨디션 선택 ──
function selectCond(id, cond) {
  document.querySelectorAll(`[id^="cb-${id}-"]`).forEach(b=>b.classList.remove('active'));
  document.getElementById(`cb-${id}-${cond}`)?.classList.add('active');
}

// ── 출석 처리 시작 ──
function startAttend(scheduleId, status, memberId, contractId, instructorId) {
  const form = document.getElementById(`attend-form-${scheduleId}`);
  if (!form) return;
  form.style.display='block';
  const condRow=document.getElementById(`cond-row-${scheduleId}`);
  const condLabel=document.getElementById(`cond-label-${scheduleId}`);
  if (status==='노쇼') {
    if(condRow) condRow.style.display='none';
    if(condLabel) condLabel.style.display='none';
  } else {
    if(condRow) condRow.style.display='flex';
    if(condLabel) condLabel.style.display='block';
    selectCond(scheduleId,'보통');
  }
  const btn=document.getElementById(`cfbtn-${scheduleId}`);
  if (btn) {
    btn.textContent = status==='참석'?'✓ 출석 완료':'✕ 노쇼 처리';
    btn.className=`confirm-btn ${status==='참석'?'success':'danger'}`;
    btn.onclick=()=>confirmAttend(scheduleId,status,memberId,contractId,instructorId);
  }
}

// ── 출석/노쇼 확정 ──
async function confirmAttend(scheduleId, status, memberId, contractId, instructorId) {
  const s=allSchedules.find(sc=>sc.id===scheduleId);
  const member=allMembers.find(m=>m.id===memberId);
  const condition=status==='참석'?(document.querySelector(`[id^="cb-${scheduleId}-"].active`)?.textContent||'보통'):'';
  const memo=document.getElementById(`memo-${scheduleId}`)?.value||'';
  showToast('처리 중...');
  try {
    await Promise.all([
      fetch(`${API}/api/schedules?id=${scheduleId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}),
      fetch(`${API}/api/sessions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        memberName:member?.name||'',memberId,contractId,instructorId,scheduleId,
        date:s?.date||selectedDate,time:s?.time||'',
        attendanceStatus:status,condition,
        memo:status==='노쇼'?(memo||'NO-SHOW'):memo,
      })})
    ]);
    showToast(status==='참석'?'출석 처리 완료!':'노쇼 처리 완료',status==='참석'?'success':'error');
    await loadSchedules();
  } catch(e) { showToast('처리 실패','error'); }
}

// ── 취소 ──
async function cancelSchedule(id) {
  if(!confirm('이 예약을 취소하시겠습니까?')) return;
  try {
    await fetch(`${API}/api/schedules?id=${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'취소'})});
    showToast('취소 처리 완료');
    await loadSchedules();
  } catch(e) { showToast('처리 실패','error'); }
}

// ── 메모 저장 ──
async function saveMemoEdit(scheduleId, contractId) {
  const cond = document.querySelector(`[id^="ce-${scheduleId}-"].active`)?.textContent || '';
  const memo = document.getElementById(`memo-edit-${scheduleId}`)?.value || '';
  const panel = document.getElementById(`panel-${scheduleId}`);
  let sessionId = panel?.dataset.sessionId || '';

  // sessionId 없으면 다시 조회
  if (!sessionId) {
    const s = allSchedules.find(sc=>sc.id===scheduleId);
    try {
      const sRes = await fetch(`${API}/api/sessions?contractId=${contractId}`);
      const sData = await sRes.json();
      const session = (sData.sessions||[]).find(se=>se.date===s?.date&&se.time===s?.time);
      if (session) sessionId = session.id;
    } catch(e) {}
  }

  if (!sessionId) { showToast('세션을 찾을 수 없습니다','error'); return; }

  try {
    await fetch(`${API}/api/sessions?id=${sessionId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({condition:cond,memo})});
    showToast('저장 완료','success');
  } catch(e) { showToast('저장 실패','error'); }
}

// ── 상태 되돌리기 ──
async function revertStatus(scheduleId, currentStatus, memberId, contractId) {
  const newStatus=currentStatus==='참석'?'노쇼':'참석';
  if(!confirm(`${currentStatus} → ${newStatus}로 변경하시겠습니까?`)) return;
  const s=allSchedules.find(sc=>sc.id===scheduleId);
  try {
    const sRes=await fetch(`${API}/api/sessions?contractId=${contractId}`);
    const sData=await sRes.json();
    const session=(sData.sessions||[]).find(se=>se.date===s?.date&&se.time===s?.time);
    await fetch(`${API}/api/schedules?id=${scheduleId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});
    if (session) {
      await fetch(`${API}/api/sessions?id=${session.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({attendanceStatus:newStatus,prevAttendanceStatus:currentStatus,contractId})});
    }
    showToast(`${newStatus}로 변경 완료`,'success');
    await loadSchedules();
  } catch(e) { showToast('변경 실패','error'); }
}

// ── 신규 예약 모달 ──
function initTimeGrid() {
  document.getElementById('ns-time-grid').innerHTML = TIMES.map(t=>
    `<button class="time-chip" onclick="selectTime('${t}',this)">${t}</button>`
  ).join('');
}

function initMemberSelect() {
  const sel=document.getElementById('ns-member');

  // 내 담당 회원만: 진행중이고 잔여 있는 계약 중 내 instructorId와 일치하는 것
  let myMemberIds;
  if (myInstr?.isDirector) {
    // L1 원장: 전체 진행중 회원
    myMemberIds = new Set(
      allContracts.filter(c=>c.status==='진행중'&&(c.remainingSessions??1)>0)
        .map(c=>c.memberId)
    );
  } else {
    // L2 강사: 본인 instructorId가 있는 진행중 계약 회원
    myMemberIds = new Set(
      allContracts.filter(c=>
        c.status==='진행중' &&
        (c.remainingSessions??1)>0 &&
        c.instructorId===myInstr?.id
      ).map(c=>c.memberId)
    );
  }

  const myMembers = allMembers.filter(m=>myMemberIds.has(m.id))
    .sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  sel.innerHTML='<option value="">회원 선택</option>'+
    myMembers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
}

async function onNsMemberChange() {
  const memberId=document.getElementById('ns-member').value;
  const sel=document.getElementById('ns-contract');
  if (!memberId) { sel.innerHTML='<option value="">회원을 먼저 선택하세요</option>'; return; }

  // 진행중 + 잔여 있는 계약만 (L2면 본인 담당만)
  let contracts = allContracts.filter(c=>
    c.memberId===memberId &&
    c.status==='진행중' &&
    (c.remainingSessions??1)>0
  );
  if (!myInstr?.isDirector) {
    contracts = contracts.filter(c=>c.instructorId===myInstr?.id);
  }

  sel.innerHTML=contracts.length
    ?contracts.map(c=>`<option value="${c.id}">${c.title} (잔여 ${c.remainingSessions}회)</option>`).join('')
    :'<option value="">진행중 계약 없음</option>';
}

function selectTime(t,el) {
  document.querySelectorAll('#ns-time-grid .time-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function selectDay(d,el) {
  document.querySelectorAll('#ns-recurring-day-row .time-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function onRecurringChange() {
  const checked=document.getElementById('ns-recurring').checked;
  document.getElementById('ns-recurring-day-row').style.display=checked?'block':'none';
}

function openNewScheduleModal() {
  // 오늘 날짜 기본값
  document.getElementById('ns-date').value=selectedDate||getTodayStr();
  document.getElementById('ns-member').value='';
  document.getElementById('ns-contract').innerHTML='<option value="">회원을 먼저 선택하세요</option>';
  document.getElementById('ns-recurring').checked=false;
  document.getElementById('ns-recurring-day-row').style.display='none';
  document.querySelectorAll('#ns-time-grid .time-chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('modal-new-schedule').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-new-schedule').classList.remove('open');
}

async function saveNewSchedule() {
  const memberId=document.getElementById('ns-member').value;
  const contractId=document.getElementById('ns-contract').value;
  const date=document.getElementById('ns-date').value;
  const timeEl=document.querySelector('#ns-time-grid .time-chip.active');
  const time=timeEl?.textContent||'';
  const isRecurring=document.getElementById('ns-recurring').checked;
  const recurringDay=document.querySelector('#ns-recurring-day-row .time-chip.active')?.textContent||'';

  if (!memberId) { showToast('회원을 선택하세요','error'); return; }
  if (!contractId) { showToast('계약을 선택하세요','error'); return; }
  if (!date) { showToast('날짜를 선택하세요','error'); return; }
  if (!time) { showToast('시간을 선택하세요','error'); return; }
  if (isRecurring && !recurringDay) { showToast('반복 요일을 선택하세요','error'); return; }

  const member=allMembers.find(m=>m.id===memberId);
  const contract=allContracts.find(c=>c.id===contractId);
  // 로그인한 강사의 instructorId 사용
  const instructorId = myInstr?.isDirector ? (allInstrs.find(i=>i.name==='Regina')?.id||'') : myInstr?.id||'';
  const instrName = myInstr?.name||'';

  showToast('등록 중...');
  try {
    const res=await fetch(`${API}/api/schedules`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      memberId,contractId,instructorId,
      memberName:member?.name||'',
      instructorName:instrName,
      date,time,
      type:'회원예약',
      isRecurring,
      recurringDay:isRecurring?recurringDay:'',
      contractEndDate:isRecurring?(contract?.endDate||''):'',
      status:'확정',
    })});
    const data=await res.json();
    if (res.ok) {
      closeModal();
      showToast(`예약 ${data.count||1}건 등록 완료`,'success');
      await loadSchedules();
    } else { showToast('등록 실패: '+(data.error||'오류'),'error'); }
  } catch(e) { showToast('등록 실패','error'); }
}

// ── 토스트 ──
let toastTimer=null;
function showToast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show${type?' '+type:''}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── 자동 로그인 복원 ──
window.addEventListener('DOMContentLoaded', async()=>{
  const level=sessionStorage.getItem('instrLevel');
  if (level) await initApp(parseInt(level));
});
</script>
