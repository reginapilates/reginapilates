<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Regina Pilates — 강사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F2;
    --white: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #888;
    --border: #E5E2DE;
    --accent: #1A1A1A;
    --success: #27AE60;
    --danger: #E74C3C;
    --warning: #E67E22;
    --surface: #F0EDE9;
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* 로그인 화면 */
  #login-screen {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: var(--accent);
  }
  .login-logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.15em;
    color: #fff;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    margin-bottom: 48px;
  }
  .login-box {
    width: 100%;
    max-width: 320px;
  }
  .login-input {
    width: 100%;
    padding: 16px 20px;
    font-size: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-radius: var(--radius);
    outline: none;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .login-input::placeholder { color: rgba(255,255,255,0.4); }
  .login-btn {
    width: 100%;
    padding: 16px;
    background: #fff;
    color: var(--accent);
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .login-error {
    display: none;
    color: #FF6B6B;
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
  }

  /* 앱 화면 */
  #app { display: none; min-height: 100dvh; flex-direction: column; }

  /* 헤더 */
  .app-header {
    background: var(--accent);
    color: #fff;
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.1em;
  }
  .header-instructor {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }
  .logout-btn-sm {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }

  /* 날짜 네비게이션 */
  .date-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .date-nav::-webkit-scrollbar { display: none; }
  .date-nav-arrow {
    background: none;
    border: none;
    padding: 14px 10px;
    font-size: 18px;
    color: var(--text-muted);
    cursor: pointer;
    flex-shrink: 0;
  }
  .date-tabs {
    display: flex;
    flex: 1;
    gap: 4px;
    padding: 8px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .date-tabs::-webkit-scrollbar { display: none; }
  .date-tab {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    min-width: 52px;
  }
  .date-tab.active {
    background: var(--accent);
    color: #fff;
  }
  .date-tab-day {
    font-size: 10px;
    color: inherit;
    opacity: 0.7;
    margin-bottom: 2px;
  }
  .date-tab.active .date-tab-day { opacity: 0.7; color: #fff; }
  .date-tab-num {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1;
  }
  .date-tab.today:not(.active) .date-tab-num {
    color: var(--danger);
    font-weight: 600;
  }

  /* 스케줄 목록 */
  .schedule-list {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-muted);
    gap: 12px;
  }
  .empty-state-icon { font-size: 40px; }
  .empty-state-text { font-size: 14px; }

  /* 스케줄 카드 */
  .schedule-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: transform 0.1s;
  }
  .schedule-card:active { transform: scale(0.98); }
  .schedule-card.status-참석 { border-left: 4px solid var(--success); opacity: 0.75; }
  .schedule-card.status-노쇼 { border-left: 4px solid var(--danger); opacity: 0.75; }
  .schedule-card.status-취소 { border-left: 4px solid var(--border); opacity: 0.5; }
  .schedule-card.status-확정 { border-left: 4px solid var(--accent); }

  .card-main {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }
  .card-time {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    min-width: 60px;
    line-height: 1;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-member {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-program {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sessions {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .card-status {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .card-status.s-확정 { background: #F0EDE9; color: var(--text-muted); }
  .card-status.s-참석 { background: #EAFAF1; color: var(--success); }
  .card-status.s-노쇼 { background: #FDEDEC; color: var(--danger); }
  .card-status.s-취소 { background: #F5F5F5; color: #bbb; }

  /* 출석 버튼 영역 */
  .card-actions {
    display: none;
    padding: 0 16px 16px;
    gap: 8px;
    flex-direction: column;
  }
  .card-actions.open { display: flex; }

  .action-row {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .action-btn:active { transform: scale(0.96); opacity: 0.8; }
  .btn-attend { background: var(--success); color: #fff; }
  .btn-noshow { background: var(--danger); color: #fff; }
  .btn-cancel { background: var(--surface); color: var(--text-muted); font-size: 13px; }

  /* 메모/컨디션 입력 */
  .memo-section {
    display: none;
    padding: 0 16px 16px;
    gap: 10px;
    flex-direction: column;
  }
  .memo-section.open { display: flex; }
  .memo-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .cond-row {
    display: flex;
    gap: 6px;
  }
  .cond-btn {
    flex: 1;
    padding: 9px 4px;
    border: 1px solid var(--border);
    background: var(--white);
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .cond-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .memo-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    background: var(--white);
    color: var(--text);
    outline: none;
    min-height: 70px;
  }
  .memo-input:focus { border-color: var(--accent); }
  .confirm-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .confirm-btn:active { opacity: 0.85; }

  /* 상태 변경 버튼 (이미 처리된 경우) */
  .revert-btn {
    width: 100%;
    padding: 11px;
    background: var(--surface);
    color: var(--text-muted);
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 4px;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.25s;
    z-index: 9999;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* 로딩 */
  .loading-spinner {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 날짜 헤더 */
  .date-header {
    font-size: 13px;
    color: var(--text-muted);
    padding: 4px 4px 8px;
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-logo">REGINA PILATES</div>
  <div class="login-sub">레지나 필라테스 청담 — 강사</div>
  <div class="login-box">
    <input class="login-input" type="password" id="pw-input" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다</div>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app">
  <div class="app-header">
    <div>
      <div class="login-logo" style="font-size:14px;">REGINA PILATES</div>
      <div class="header-instructor" id="header-instructor-name"></div>
    </div>
    <button class="logout-btn-sm" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="date-nav">
    <button class="date-nav-arrow" onclick="shiftWeek(-1)">‹</button>
    <div class="date-tabs" id="date-tabs"></div>
    <button class="date-nav-arrow" onclick="shiftWeek(1)">›</button>
  </div>

  <div class="schedule-list" id="schedule-list">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let instrInfo = null;         // 로그인한 강사 정보
let allSchedules = [];        // 전체 스케줄
let allMembers = [];          // 회원 목록
let allContracts = [];        // 계약 목록
let currentDate = new Date(); // 현재 선택된 날짜
let selectedDateStr = '';
let weekOffset = 0;           // 주 오프셋

// ── 날짜 유틸 ──
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayStr() { return toDateStr(new Date()); }

function getWeekDates(baseDate, offset = 0) {
  const d = new Date(baseDate);
  d.setDate(d.getDate() + offset * 7);
  const day = d.getDay() === 0 ? 6 : d.getDay() - 1; // 월=0
  const monday = new Date(d);
  monday.setDate(d.getDate() - day);
  return Array.from({length: 7}, (_, i) => {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    return dd;
  });
}

// ── 로그인 ──
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  try {
    const res = await fetch(`${API}/api/auth`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (res.ok && data.success) {
      sessionStorage.setItem('instrPw', pw);
      sessionStorage.setItem('instrLevel', data.level);
      await initApp(data.level, pw);
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.clear();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── 초기화 ──
async function initApp(level, pw) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // 강사 목록에서 현재 강사 찾기 (L2는 강사, L1은 원장)
  try {
    const instrRes = await fetch(`${API}/api/instructors`);
    const instrData = await instrRes.json();
    const allInstrs = instrData.instructors || [];

    if (level === 1) {
      instrInfo = { name: 'Regina 원장', id: null, isDirector: true };
    } else {
      // L2 강사는 비밀번호로 매칭 (혹은 첫 번째 강사)
      instrInfo = allInstrs[0] || { name: '강사', id: null };
    }
    document.getElementById('header-instructor-name').textContent = instrInfo.name;
  } catch(e) {}

  // 오늘 날짜로 초기화
  const today = new Date();
  selectedDateStr = toDateStr(today);
  weekOffset = 0;

  renderDateTabs();
  await loadSchedules();
}

// ── 날짜 탭 렌더 ──
function renderDateTabs() {
  const todayStr = getTodayStr();
  const days = ['일','월','화','수','목','금','토'];
  const dates = getWeekDates(new Date(), weekOffset);

  const tabsEl = document.getElementById('date-tabs');
  tabsEl.innerHTML = dates.map(d => {
    const ds = toDateStr(d);
    const isToday = ds === todayStr;
    const isSelected = ds === selectedDateStr;
    return `<div class="date-tab${isSelected?' active':''}${isToday?' today':''}"
      onclick="selectDate('${ds}')">
      <span class="date-tab-day">${days[d.getDay()]}</span>
      <span class="date-tab-num">${d.getDate()}</span>
    </div>`;
  }).join('');

  // 선택된 탭으로 스크롤
  setTimeout(() => {
    const active = tabsEl.querySelector('.date-tab.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

function selectDate(dateStr) {
  selectedDateStr = dateStr;
  renderDateTabs();
  renderScheduleList();
}

function shiftWeek(dir) {
  weekOffset += dir;
  const dates = getWeekDates(new Date(), weekOffset);
  selectedDateStr = toDateStr(dates[0]);
  renderDateTabs();
  loadSchedules();
}

// ── 스케줄 로드 ──
async function loadSchedules() {
  document.getElementById('schedule-list').innerHTML =
    '<div class="loading-spinner"><div class="spinner"></div></div>';

  const dates = getWeekDates(new Date(), weekOffset);
  const startDate = toDateStr(dates[0]);
  const endDate = toDateStr(dates[dates.length - 1]);

  try {
    const [schRes, mRes, cRes] = await Promise.all([
      fetch(`${API}/api/schedules?startDate=${startDate}&endDate=${endDate}`),
      fetch(`${API}/api/members`),
      fetch(`${API}/api/contracts`),
    ]);
    const schData = await schRes.json();
    const mData = await mRes.json();
    const cData = await cRes.json();

    allSchedules = (schData.schedules || []).filter(s => s.status !== '취소');
    allMembers = mData.members || [];
    allContracts = cData.contracts || [];

    renderScheduleList();
  } catch(e) {
    document.getElementById('schedule-list').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">불러오기 실패</div></div>';
  }
}

// ── 스케줄 렌더 ──
function renderScheduleList() {
  const listEl = document.getElementById('schedule-list');
  const todayStr = getTodayStr();

  // 선택 날짜의 스케줄 (내 담당만, 또는 L1이면 전체)
  let daySchedules = allSchedules
    .filter(s => s.date === selectedDateStr)
    .sort((a, b) => (a.time||'').localeCompare(b.time||''));

  // L2 강사는 본인 스케줄만
  if (instrInfo && instrInfo.id && !instrInfo.isDirector) {
    daySchedules = daySchedules.filter(s => s.instructorId === instrInfo.id);
  }

  if (daySchedules.length === 0) {
    const isToday = selectedDateStr === todayStr;
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">${isToday ? '☀️' : '📅'}</div>
        <div class="empty-state-text">${isToday ? '오늘은 예약이 없어요' : '예약이 없습니다'}</div>
      </div>`;
    return;
  }

  const memberMap = {};
  allMembers.forEach(m => { memberMap[m.id] = m; });
  const contractMap = {};
  allContracts.forEach(c => { contractMap[c.id] = c; });

  listEl.innerHTML = `
    <div class="date-header">${formatDateLabel(selectedDateStr)}</div>
    ${daySchedules.map(s => renderCard(s, memberMap, contractMap)).join('')}
  `;
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  const todayStr = getTodayStr();
  const label = dateStr === todayStr ? ' · 오늘' : '';
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})${label}`;
}

function renderCard(s, memberMap, contractMap) {
  const member = memberMap[s.memberId] || {};
  const contract = contractMap[s.contractId] || {};
  const status = s.status || '확정';
  const remaining = contract.remainingSessions != null ? `잔여 ${contract.remainingSessions}회` : '';
  const statusLabel = { '확정':'예약', '참석':'출석', '노쇼':'노쇼', '취소':'취소' }[status] || status;

  const isDone = status === '참석' || status === '노쇼';

  return `
  <div class="schedule-card status-${status}" id="card-${s.id}">
    <div class="card-main" onclick="toggleCard('${s.id}', '${status}')">
      <div class="card-time">${s.time||'—'}</div>
      <div class="card-info">
        <div class="card-member">${member.name || '—'}</div>
        <div class="card-program">${contract.title || '—'}</div>
        ${remaining ? `<div class="card-sessions">${remaining}</div>` : ''}
      </div>
      <div class="card-status s-${status}">${statusLabel}</div>
    </div>

    ${!isDone ? `
    <!-- 미처리: 참석/노쇼/취소 버튼 -->
    <div class="card-actions" id="actions-${s.id}">
      <div class="action-row">
        <button class="action-btn btn-attend" onclick="startAttend('${s.id}','참석','${s.memberId}','${s.contractId}','${s.instructorId||''}')">
          ✓ 출석
        </button>
        <button class="action-btn btn-noshow" onclick="startAttend('${s.id}','노쇼','${s.memberId}','${s.contractId}','${s.instructorId||''}')">
          ✕ 노쇼
        </button>
      </div>
      <button class="action-btn btn-cancel" onclick="cancelSchedule('${s.id}')">취소 처리</button>
    </div>
    ` : `
    <!-- 처리완료: 메모 수정 + 되돌리기 -->
    <div class="card-actions" id="actions-${s.id}">
      <div class="memo-label">메모 수정</div>
      <select class="cond-btn" id="cond-edit-${s.id}" style="padding:10px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:inherit;background:var(--white);">
        <option value="">컨디션 선택</option>
        <option>최상</option><option>좋음</option><option>보통</option><option>피로</option><option>통증</option>
      </select>
      <textarea class="memo-input" id="memo-edit-${s.id}" placeholder="메모 입력"></textarea>
      <button class="confirm-btn" style="background:var(--text-muted);" onclick="saveMemoEdit('${s.id}','${s.contractId}','${status}')">저장</button>
      <button class="revert-btn" onclick="revertStatus('${s.id}','${status}','${s.memberId}','${s.contractId}')">
        ${status === '참석' ? '출석 → 노쇼로 변경' : '노쇼 → 출석으로 변경'}
      </button>
    </div>
    `}

    <!-- 참석/노쇼 처리 시 메모 입력 -->
    <div class="memo-section" id="memo-${s.id}">
      <div class="memo-label">컨디션</div>
      <div class="cond-row">
        ${['최상','좋음','보통','피로','통증'].map(c =>
          `<button class="cond-btn" id="cond-${s.id}-${c}" onclick="selectCond('${s.id}','${c}')">${c}</button>`
        ).join('')}
      </div>
      <textarea class="memo-input" id="memo-${s.id}-text" placeholder="수업 메모 (선택사항)"></textarea>
      <button class="confirm-btn" id="confirm-btn-${s.id}" onclick="">확인</button>
    </div>
  </div>`;
}

// ── 카드 열기/닫기 ──
function toggleCard(id, status) {
  const actionsEl = document.getElementById(`actions-${id}`);
  if (!actionsEl) return;
  const isOpen = actionsEl.classList.contains('open');
  // 다른 카드 닫기
  document.querySelectorAll('.card-actions.open, .memo-section.open').forEach(el => {
    el.classList.remove('open');
  });
  if (!isOpen) actionsEl.classList.add('open');
}

// ── 컨디션 선택 ──
function selectCond(scheduleId, cond) {
  document.querySelectorAll(`[id^="cond-${scheduleId}-"]`).forEach(btn => btn.classList.remove('active'));
  document.getElementById(`cond-${scheduleId}-${cond}`)?.classList.add('active');
}

// ── 참석/노쇼 처리 시작 ──
function startAttend(scheduleId, status, memberId, contractId, instructorId) {
  // 액션 닫고 메모 섹션 열기
  const actionsEl = document.getElementById(`actions-${scheduleId}`);
  const memoEl = document.getElementById(`memo-${scheduleId}`);
  if (actionsEl) actionsEl.classList.remove('open');
  if (memoEl) memoEl.classList.add('open');

  // 노쇼는 컨디션 없이 바로 확인 버튼 표시
  const condRow = memoEl?.querySelector('.cond-row');
  const condLabel = memoEl?.querySelector('.memo-label');
  if (status === '노쇼') {
    if (condRow) condRow.style.display = 'none';
    if (condLabel) condLabel.style.display = 'none';
  } else {
    if (condRow) condRow.style.display = 'flex';
    if (condLabel) condLabel.style.display = 'block';
    // 기본 컨디션 '보통' 선택
    selectCond(scheduleId, '보통');
  }

  // 확인 버튼에 함수 바인딩
  const confirmBtn = document.getElementById(`confirm-btn-${scheduleId}`);
  if (confirmBtn) {
    confirmBtn.textContent = status === '참석' ? '✓ 출석 완료' : '✕ 노쇼 처리';
    confirmBtn.onclick = () => confirmAttend(scheduleId, status, memberId, contractId, instructorId);
  }
}

// ── 출석/노쇼 확정 ──
async function confirmAttend(scheduleId, status, memberId, contractId, instructorId) {
  const s = allSchedules.find(sc => sc.id === scheduleId);
  const member = allMembers.find(m => m.id === memberId);
  const condition = status === '참석'
    ? (document.querySelector(`[id^="cond-${scheduleId}-"].active`)?.textContent || '보통')
    : '';
  const memo = document.getElementById(`memo-${scheduleId}-text`)?.value || '';

  showToast('처리 중...');

  try {
    // 1. 스케줄 상태 업데이트
    await fetch(`${API}/api/schedules?id=${scheduleId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status }),
    });

    // 2. 세션 생성
    await fetch(`${API}/api/sessions`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        memberName: member?.name || '',
        memberId,
        contractId,
        instructorId,
        scheduleId,
        date: s?.date || selectedDateStr,
        time: s?.time || '',
        attendanceStatus: status,
        condition,
        memo: status === '노쇼' ? (memo || 'NO-SHOW') : memo,
      }),
    });

    showToast(status === '참석' ? '출석 처리 완료!' : '노쇼 처리 완료', status === '참석' ? 'success' : 'error');
    await loadSchedules();
  } catch(e) {
    showToast('처리 실패', 'error');
  }
}

// ── 취소 처리 ──
async function cancelSchedule(scheduleId) {
  if (!confirm('이 예약을 취소하시겠습니까?')) return;
  try {
    await fetch(`${API}/api/schedules?id=${scheduleId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status: '취소' }),
    });
    showToast('취소 처리 완료');
    await loadSchedules();
  } catch(e) {
    showToast('처리 실패', 'error');
  }
}

// ── 메모 수정 저장 ──
async function saveMemoEdit(scheduleId, contractId, currentStatus) {
  const cond = document.getElementById(`cond-edit-${scheduleId}`)?.value || '';
  const memo = document.getElementById(`memo-edit-${scheduleId}`)?.value || '';

  try {
    // 해당 세션 찾아서 수정
    const sRes = await fetch(`${API}/api/sessions?contractId=${contractId}`);
    const sData = await sRes.json();
    const s = allSchedules.find(sc => sc.id === scheduleId);
    const session = (sData.sessions||[]).find(sess =>
      sess.date === s?.date && sess.time === s?.time
    );

    if (session) {
      await fetch(`${API}/api/sessions?id=${session.id}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ condition: cond, memo }),
      });
      showToast('저장 완료', 'success');
    } else {
      showToast('세션 정보를 찾을 수 없습니다', 'error');
    }
  } catch(e) {
    showToast('저장 실패', 'error');
  }
}

// ── 상태 되돌리기 (참석↔노쇼) ──
async function revertStatus(scheduleId, currentStatus, memberId, contractId) {
  const newStatus = currentStatus === '참석' ? '노쇼' : '참석';
  if (!confirm(`${currentStatus} → ${newStatus}로 변경하시겠습니까?`)) return;

  try {
    // 스케줄 상태 변경
    await fetch(`${API}/api/schedules?id=${scheduleId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status: newStatus }),
    });

    // 세션 상태 변경 + UsedSessions 조정
    const sRes = await fetch(`${API}/api/sessions?contractId=${contractId}`);
    const sData = await sRes.json();
    const s = allSchedules.find(sc => sc.id === scheduleId);
    const session = (sData.sessions||[]).find(sess =>
      sess.date === s?.date && sess.time === s?.time
    );
    if (session) {
      await fetch(`${API}/api/sessions?id=${session.id}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          attendanceStatus: newStatus,
          prevAttendanceStatus: currentStatus,
          contractId,
        }),
      });
    }

    showToast(`${newStatus}로 변경 완료`, 'success');
    await loadSchedules();
  } catch(e) {
    showToast('변경 실패', 'error');
  }
}

// ── 토스트 ──
let toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show${type ? ' '+type : ''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 세션 복원 ──
window.addEventListener('DOMContentLoaded', async () => {
  const savedLevel = sessionStorage.getItem('instrLevel');
  const savedPw = sessionStorage.getItem('instrPw');
  if (savedLevel && savedPw) {
    await initApp(parseInt(savedLevel), savedPw);
  }
});
</script>
