<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGINA PILATES — Program Price</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #FAFAF7;
  --dark: #1A1816;
  --accent: #8E8276;
  --accent-light: #C4BAB0;
  --surface: #F3F2EE;
  --border: #E5E3DC;
  --white: #FFFFFF;
  --red: #C0392B;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  padding: 0;
}

/* ── CONTROL BAR ── */
.control-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: var(--dark);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 100;
}
.control-bar label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-family: 'Outfit', sans-serif;
  letter-spacing: 0.08em;
}
.control-bar select {
  padding: 6px 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.control-bar select option { background: var(--dark); }
.btn-print {
  margin-left: auto;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  letter-spacing: 0.05em;
  cursor: pointer;
}
.btn-print:hover { background: var(--accent-light); color: var(--dark); }
.loading-msg {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-family: 'Outfit', sans-serif;
}

/* ── VIEWER ── */
.viewer {
  margin-top: 56px;
  padding: 60px 48px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

/* ── HEADER ── */
.doc-header {
  text-align: center;
  margin-bottom: 52px;
}
.doc-logo {
  font-family: 'Outfit', sans-serif;
  font-weight: 200;
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.doc-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 36px;
  letter-spacing: 0.05em;
  color: var(--dark);
  line-height: 1.2;
}
.doc-subtitle {
  font-size: 13px;
  color: var(--accent);
  margin-top: 8px;
  letter-spacing: 0.05em;
}

/* ── PRICE TABLE ── */
.price-section {
  margin-bottom: 40px;
}

.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--dark);
  color: #fff;
  margin-bottom: 0;
}
.section-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.08em;
}
.section-base-price {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.05em;
}
.section-base-price b {
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  font-size: 16px;
  color: #fff;
  margin-left: 8px;
}

.price-table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--border);
  border-top: none;
}
.price-table th {
  padding: 12px 20px;
  text-align: center;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--accent);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.price-table th:last-child { border-right: none; }
.price-table td {
  padding: 18px 20px;
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.price-table td:last-child { border-right: none; }
.price-table tr:last-child td { border-bottom: none; }
.price-table tr:hover td { background: var(--surface); }

.td-sessions {
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 22px;
  color: var(--dark);
}
.td-price { color: var(--accent); }
.td-discount {
  color: var(--red);
  font-weight: 500;
}
.td-final {
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  font-size: 16px;
  color: var(--dark);
}
.td-period { color: var(--accent); font-size: 13px; }
.td-per-session { font-size: 13px; color: var(--accent-light); }

/* ── FOOTER NOTE ── */
.doc-footer {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--accent-light);
  text-align: right;
  letter-spacing: 0.05em;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--accent);
  font-size: 14px;
}

/* ── PRINT ── */
* { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

@media print {
  .control-bar { display: none !important; }
  .viewer { margin-top: 0; padding: 40px 36px; }
  body { background: #fff; }
  .price-table tr:hover td { background: transparent; }
  .section-header { background: var(--dark) !important; color: #fff !important; }
  .price-table th { background: var(--surface) !important; }
  .td-discount { color: var(--red) !important; }
}
</style>
</head>
<body>

<!-- 컨트롤 바 -->
<div class="control-bar">
  <label>INSTRUCTOR</label>
  <select id="instructor-select" onchange="renderViewer()">
    <option value="">전체 강사</option>
  </select>
  <label style="margin-left:16px">TYPE</label>
  <select id="type-select" onchange="renderViewer()">
    <option value="">전체 타입</option>
    <option value="1:1">Private 1:1</option>
    <option value="1:2">Duet 1:2</option>
    <option value="1:3">Triple 1:3</option>
  </select>
  <span class="loading-msg" id="loading-msg">불러오는 중...</span>
  <button class="btn-print" onclick="window.print()">🖨️ 인쇄 / PDF 저장</button>
</div>

<!-- 뷰어 -->
<div class="viewer" id="viewer">
  <div class="empty-state">프로그램을 불러오는 중입니다...</div>
</div>

<script>
const API = '..'; // price-viewer.html은 /tools/ 안에 있으므로 상위 경로

let allPrograms = [];
let allInstructors = [];

async function loadData() {
  try {
    const [pRes, iRes] = await Promise.all([
      fetch(`${API}/api/programs`),
      fetch(`${API}/api/instructors`)
    ]);
    const pData = await pRes.json();
    const iData = await iRes.json();

    allPrograms = pData.all || [];
    allInstructors = iData.instructors || [];

    // 강사 필터 옵션
    const instrSel = document.getElementById('instructor-select');
    allInstructors.filter(i => i.isActive).forEach(i => {
      const opt = document.createElement('option');
      opt.value = i.id;
      opt.textContent = i.name;
      instrSel.appendChild(opt);
    });

    document.getElementById('loading-msg').style.display = 'none';
    renderViewer();
  } catch(e) {
    document.getElementById('loading-msg').textContent = '불러오기 실패';
    document.getElementById('viewer').innerHTML = '<div class="empty-state">데이터를 불러올 수 없습니다.</div>';
  }
}



function fmt(n) {
  return n ? parseInt(n).toLocaleString() : '0';
}

function renderViewer() {
  const instrId = document.getElementById('instructor-select').value;
  const typeFilter = document.getElementById('type-select').value;

  const instrName = instrId
    ? allInstructors.find(i => i.id === instrId)?.name || ''
    : '';

  const typeNames = { '1:1': 'Private Lesson', '1:2': 'Duet Lesson', '1:3': 'Triple Lesson' };
  const typeOrder = { '1:1': 0, '1:2': 1, '1:3': 2 };

  // 필터링
  let programs = allPrograms.filter(p => p.isActive);
  if (instrId) programs = programs.filter(p => p.instructorId === instrId);
  if (typeFilter) programs = programs.filter(p => p.type === typeFilter);

  if (!programs.length) {
    document.getElementById('viewer').innerHTML = '<div class="empty-state">표시할 프로그램이 없습니다.</div>';
    return;
  }

  // 제목
  const titleParts = [];
  if (instrName) titleParts.push(instrName);
  if (typeFilter) titleParts.push(typeNames[typeFilter] || typeFilter);
  const docTitle = titleParts.length ? titleParts.join(' · ') + ' Lesson' : 'Program & Price';

  let html = `
    <div class="doc-header">
      <div class="doc-logo">Regina Pilates · Classic Pilates Studio</div>
      <div class="doc-title">${docTitle}</div>
      <div class="doc-subtitle">VAT 포함 금액입니다</div>
    </div>
  `;

  // 강사 → 타입 순으로 그룹핑
  const instrGroups = {};
  programs.forEach(p => {
    const key = p.instructorId || 'unknown';
    if (!instrGroups[key]) instrGroups[key] = [];
    instrGroups[key].push(p);
  });

  Object.entries(instrGroups).forEach(([iId, progs]) => {
    const instr = allInstructors.find(i => i.id === iId);
    const instrDisplayName = instr?.name || '강사';

    // 타입별 그룹
    const typeGroups = {};
    progs.forEach(p => {
      const t = p.type || '1:1';
      if (!typeGroups[t]) typeGroups[t] = [];
      typeGroups[t].push(p);
    });

    Object.entries(typeGroups)
      .sort(([a], [b]) => (typeOrder[a]||9) - (typeOrder[b]||9))
      .forEach(([type, typeProgs]) => {
        const typeName = typeNames[type] || type;
        const basePrice = typeProgs[0]?.pricePerSession || 0;
        const sorted = [...typeProgs].sort((a, b) => a.sessions - b.sessions);

        html += `
          <div class="price-section">
            <div class="section-header">
              <span class="section-name">${typeName} (50min) · ${instrDisplayName}</span>
              <span class="section-base-price">1회 수업비: <b>${fmt(basePrice)}원</b></span>
            </div>
            <table class="price-table">
              <thead>
                <tr>
                  <th>Session</th>
                  <th>Price</th>
                  <th>Rate of D.C</th>
                  <th>D.C Price</th>
                  <th>Period(month)</th>
                  <th>Price per 1session</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.map(p => {
                  const totalPrice = p.totalPrice || (p.sessions * p.pricePerSession);
                  const finalPrice = p.finalPrice || totalPrice;
                  const perSession = p.sessions > 0 ? Math.floor(finalPrice / p.sessions / 100) * 100 : 0;
                  const duration = p.duration ? `${p.duration}개월` : '—';
                  return `<tr>
                    <td class="td-sessions">${p.sessions}</td>
                    <td class="td-price">${fmt(totalPrice)}</td>
                    <td class="td-discount">${p.discount || 0}%</td>
                    <td class="td-final">${fmt(finalPrice)}</td>
                    <td class="td-period">${duration}</td>
                    <td class="td-per-session">${fmt(perSession)}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`;
      });
  });

  html += `<div class="doc-footer">※ VAT 포함 금액입니다.</div>`;
  document.getElementById('viewer').innerHTML = html;
}

loadData();
</script>
</body>
</html>
